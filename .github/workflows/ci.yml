name: CI — Trigger BDD Tests on Merge

# Fires only on actual merge to main, NOT on pull_request open/update
on:
  push:
    branches: [ main ]

jobs:
  trigger-bdd-tests:
    name: Trigger BDD Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Trigger workflow_dispatch in bdd_test_suite_python
        uses: actions/github-script@v7
        with:
          # PAT stored as a repo secret — needs repo + workflow scopes
          github-token: ${{ secrets.TEST_REPO_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'ankitwadhwa28',
              repo:  'bdd_test_suite_python',
              workflow_id: 'bdd-tests.yml',
              ref: 'main',
              inputs: {
                triggered_by: 'sample-app-repo',
                app_commit:   context.sha,
                app_ref:      context.ref
              }
            });
            core.info(`BDD test suite triggered for commit ${context.sha}`);

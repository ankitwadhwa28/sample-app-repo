name: CI — Trigger BDD Tests on Merge

# Fires only on actual merge to main, NOT on pull_request open/update
on:
  push:
    branches: [ main ]

jobs:
  trigger-bdd-tests:
    name: Trigger BDD Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Validate TEST_REPO_TOKEN secret is configured
        env:
          TOKEN: ${{ secrets.TEST_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::TEST_REPO_TOKEN secret is missing."
            echo "Fix: sample-app-repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "  Name : TEST_REPO_TOKEN"
            echo "  Value: GitHub PAT with 'repo' and 'workflow' scopes"
            exit 1
          fi
          echo "TEST_REPO_TOKEN is present."

      - name: Trigger workflow_dispatch in bdd_test_suite_python
        env:
          GH_TOKEN: ${{ secrets.TEST_REPO_TOKEN }}
        run: |
          gh workflow run bdd-tests.yml \
            --repo ankitwadhwa28/bdd_test_suite_python \
            --ref main \
            -f triggered_by=sample-app-repo \
            -f app_commit=${{ github.sha }} \
            -f app_ref=${{ github.ref }}
          echo "BDD test suite triggered for commit ${{ github.sha }}"
